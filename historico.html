<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Almoxarifado</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="user-info">👤 <span id="userNameDisplay">...</span></div>
        <a href="almoxerifado.html"><button style="background: white; color: var(--azul-escuro);">Voltar</button></a>
    </div>

    <div class="container">
        <div class="card" style="padding: 15px; margin-bottom: 20px;">
            <h4 style="margin:0 0 10px 0">Filtros de Período</h4>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="date" id="dataInicio" class="search-bar" style="width: auto; flex:1">
                <input type="date" id="dataFim" class="search-bar" style="width: auto; flex:1">
            </div>
            <input type="text" id="buscaHistorico" placeholder="Buscar por produto..." class="search-bar" onkeyup="carregarHistorico()">
        </div>

        <div id="listaHistorico" class="grid-cards">
            </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
