<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurar Primeiro Acesso</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 450px;">
        <h2>Finalizar Cadastro</h2>
        <p>Defina seu nome de usuário e uma nova senha para continuar.</p>
        
        <input type="text" id="novoUsername" placeholder="Nome de Usuário (Ex: douglas_brito)" class="search-bar">
        <input type="password" id="novaSenha" placeholder="Nova Senha" class="search-bar">
        <input type="password" id="confirmaSenha" placeholder="Confirme a Senha" class="search-bar">
        
        <button onclick="finalizarCadastro()" style="width: 100%;">Salvar e Acessar</button>
        <p id="msgErro" style="color: red;"></p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
