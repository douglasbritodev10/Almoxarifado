<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado - Login</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Almoxarifado">

    <link rel="stylesheet" href="css/style.css">

    <script>
        // Registro do Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker registrado com sucesso!"))
                .catch(err => console.log("Erro ao registrar Service Worker:", err));
        }
    </script>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 style="color: var(--azul-escuro); margin-bottom: 20px;">Login de Acesso</h2>
        <input type="text" id="loginId" placeholder="E-mail ou Usuário" class="search-bar">
        <input type="password" id="loginSenha" placeholder="Senha" class="search-bar">
        <button onclick="realizarLogin()" style="width: 100%; background: var(--azul-escuro); color: white; margin-top: 10px;">Entrar</button>
        <p id="msgErro" style="color: var(--vermelho); font-size: 0.8rem; margin-top: 10px;"></p>
    </div>
</div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
